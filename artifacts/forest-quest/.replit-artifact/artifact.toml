kind = "mobile"
previewPath = "/"
title = "Forest Quest"
version = "1.0.0"
id = "artifacts/forest-quest"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/forest-quest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/forest-quest", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/forest-quest", "run", "serve" ]

[services.env]
PORT = "8081"
BASE_PATH = "/"
